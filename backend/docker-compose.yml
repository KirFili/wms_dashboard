version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: wms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wms_user
      POSTGRES_PASSWORD: wms_password
      POSTGRES_DB: wms_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wms_user -d wms_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wms-backend
    restart: unless-stopped
    ports:
      - "443:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://wms_user:wms_password@db:5432/wms_dashboard
      DATABASE_URL_SYNC: postgresql+psycopg2://wms_user:wms_password@db:5432/wms_dashboard
      SECRET_KEY: change-me-to-a-secure-random-string-at-least-32-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      APP_TITLE: WMS Dashboard
      APP_VERSION: 1.0.0
      DEBUG: "false"
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      MAX_UPLOAD_SIZE_MB: "20"
      UPLOAD_DIR: ./uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
    driver: local
